name: release harmony

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag value to create the release, for example v2026.1.0'
        required: true
        type: string

permissions: {}

jobs:
  check:
    name: Check release tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: resolve-tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]{4}\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "[ERROR] invalid release tag: ${TAG}" >&2
            echo "[ERROR] expected format: v2026.0.0" >&2
            exit 1
          fi

          git check-ref-format "refs/tags/${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout harmony core code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          path: harmony
          ref: refs/tags/${{ steps.resolve-tag.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check tag is annotated
        env:
          RELEASE_TAG: ${{ steps.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail

          if ! git rev-parse -q --verify "${RELEASE_TAG}^{tag}" >/dev/null; then
            echo "[ERROR] release tag '${RELEASE_TAG}' is not annotated" >&2
            exit 1
          fi
        working-directory: harmony

  build:
    name: Build harmony binary
    needs: check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm

    steps:
      - name: Checkout mcl
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          repository: harmony-one/mcl
          path: mcl
          ref: master
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout bls
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          repository: harmony-one/bls
          path: bls
          ref: master
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout harmony core code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          path: harmony
          ref: refs/tags/${{ needs.check.outputs.tag }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Go with go.mod
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version-file: harmony/go.mod
          # Release artifacts should not restore mutable CI/PR caches.
          cache: false

      - name: Build harmony binary for Linux
        id: build-binary
        run: |
          set -euo pipefail

          ARCH="$(dpkg --print-architecture)"

          case "${ARCH}" in
            amd64|arm64)
              ;;
            *)
              echo "::error::unsupported architecture: ${ARCH}"
              exit 1
              ;;
          esac

          BINARY_NAME="harmony-${ARCH}"

          make linux_static
          mv ./bin/harmony "./bin/${BINARY_NAME}"

          file "./bin/${BINARY_NAME}"

          echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"
          echo "binary_name=${BINARY_NAME}" >> "$GITHUB_OUTPUT"
        working-directory: harmony

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: ${{ steps.build-binary.outputs.binary_name }}
          path: harmony/bin/${{ steps.build-binary.outputs.binary_name }}
          retention-days: 1
          archive: false
          if-no-files-found: error

