name: release harmony

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag value to create the release, for example v2026.1.0'
        required: true
        type: string

permissions: {}

jobs:
  check:
    name: Check release tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: resolve-tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]{4}\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "[ERROR] invalid release tag: ${TAG}" >&2
            echo "[ERROR] expected format: v2026.0.0" >&2
            exit 1
          fi

          git check-ref-format "refs/tags/${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout harmony core code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          path: harmony
          ref: refs/tags/${{ steps.resolve-tag.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check tag is annotated
        env:
          RELEASE_TAG: ${{ steps.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail

          if ! git rev-parse -q --verify "${RELEASE_TAG}^{tag}" >/dev/null; then
            echo "[ERROR] release tag '${RELEASE_TAG}' is not annotated" >&2
            exit 1
          fi
        working-directory: harmony

  build:
    name: Build harmony binary
    needs: check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm

    steps:
      - name: Checkout mcl
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          repository: harmony-one/mcl
          path: mcl
          ref: master
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout bls
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          repository: harmony-one/bls
          path: bls
          ref: master
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout harmony core code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          path: harmony
          ref: refs/tags/${{ needs.check.outputs.tag }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Go with go.mod
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version-file: harmony/go.mod
          # Release artifacts should not restore mutable CI/PR caches.
          cache: false

      - name: Build harmony binary for Linux
        id: build-binary
        run: |
          set -euo pipefail

          ARCH="$(dpkg --print-architecture)"

          case "${ARCH}" in
            amd64|arm64)
              ;;
            *)
              echo "::error::unsupported architecture: ${ARCH}"
              exit 1
              ;;
          esac

          BINARY_NAME="harmony-${ARCH}"

          make linux_static
          mv ./bin/harmony "./bin/${BINARY_NAME}"

          file "./bin/${BINARY_NAME}"

          echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"
          echo "binary_name=${BINARY_NAME}" >> "$GITHUB_OUTPUT"
        working-directory: harmony

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: ${{ steps.build-binary.outputs.binary_name }}
          path: harmony/bin/${{ steps.build-binary.outputs.binary_name }}
          retention-days: 1
          archive: false
          if-no-files-found: error

  docker-build:
    name: Build and push harmony docker image
    needs: [check, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout Dockerfile and .dockerignore
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          path: harmony
          ref: refs/tags/${{ needs.check.outputs.tag }}
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout: |
            scripts/docker/Dockerfile.release
            scripts/docker/.dockerignore
          sparse-checkout-cone-mode: false

      - name: Download harmony binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          pattern: harmony-*
          path: docker-context
          merge-multiple: true

      - name: Prepare Docker build context
        run: |
          set -euo pipefail

          [[ -s docker-context/harmony-amd64 ]]
          [[ -s docker-context/harmony-arm64 ]]
          [[ -s harmony/scripts/docker/Dockerfile.release ]]
          [[ -s harmony/scripts/docker/.dockerignore ]]

          mv harmony/scripts/docker/Dockerfile.release docker-context/Dockerfile
          mv harmony/scripts/docker/.dockerignore docker-context/.dockerignore

          file docker-context/harmony-amd64
          file docker-context/harmony-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 #v4.1.0
        with:
          platforms: arm64
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf #v7.2.0
        env:
          DOCKER_BUILD_RECORD_RETENTION_DAYS: 1
        with:
          context: ./docker-context
          file: ./docker-context/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            harmonyone/harmony:${{ needs.check.outputs.tag }}
            harmonyone/harmony:latest

  release-page:
    name: Sign binaries and create draft release
    needs: [check, build, docker-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout harmony core code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          path: harmony
          ref: refs/tags/${{ needs.check.outputs.tag }}
          fetch-depth: 1
          persist-credentials: false

      - name: Get release metadata
        env:
          RELEASE_TAG: ${{ needs.check.outputs.tag }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          COMMIT_SHA="$(git rev-parse --short=12 HEAD)"
          VERSION_LONG="${RELEASE_TAG}-${COMMIT_SHA}"

          echo "build_version=${VERSION}" >> "$GITHUB_ENV"
          echo "build_version_long=${VERSION_LONG}" >> "$GITHUB_ENV"
        working-directory: harmony

      - name: Download harmony binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          pattern: harmony-*
          path: release-assets
          merge-multiple: true

      - name: Verify downloaded artifacts
        run: |
          set -euo pipefail

          [[ -s release-assets/harmony-amd64 ]]
          [[ -s release-assets/harmony-arm64 ]]

          file release-assets/harmony-amd64
          file release-assets/harmony-arm64

      - name: Import GPG private key and export public key
        id: gpg-key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.gnupg
          mkdir -p release-assets

          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import

          KEY_FINGERPRINT="$(
            gpg --batch --with-colons --list-secret-keys \
              | awk -F: '/^fpr:/ { print $10; exit }'
          )"

          if [[ -z "${KEY_FINGERPRINT}" ]]; then
            echo "::error::GPG private key was not imported"
            exit 1
          fi

          gpg --batch --armor --export "${KEY_FINGERPRINT}" \
            > release-assets/RELEASE_SIGNING_KEY.asc

          [[ -s release-assets/RELEASE_SIGNING_KEY.asc ]]

          echo "fingerprint=${KEY_FINGERPRINT}" >> "$GITHUB_OUTPUT"
          echo "[INFO] GPG public key exported"
          echo "[INFO] GPG signing key fingerprint: ${KEY_FINGERPRINT}"

      - name: Sign binaries and generate checksums
        env:
          GPG_PRIVATE_KEY_PASS: ${{ secrets.GPG_PRIVATE_KEY_PASS }}
          GPG_KEY_FINGERPRINT: ${{ steps.gpg-key.outputs.fingerprint }}
        run: |
          set -euo pipefail

          cd release-assets

          for binary in harmony-amd64 harmony-arm64; do
            gpg --batch --yes --pinentry-mode loopback \
              --local-user "${GPG_KEY_FINGERPRINT}" \
              --passphrase-fd 3 \
              --output "${binary}.sig" \
              --detach-sign "${binary}" 3<<<"${GPG_PRIVATE_KEY_PASS}"

            sha256sum "${binary}" > "${binary}.sha256"
          done

      - name: Add legacy harmony asset name
        run: |
          set -euo pipefail

          cp release-assets/harmony-amd64 release-assets/harmony

      - name: Generate release notes from tag message
        env:
          RELEASE_TAG: ${{ needs.check.outputs.tag }}
          GPG_KEY_FINGERPRINT: ${{ steps.gpg-key.outputs.fingerprint }}
          DOCKER_IMAGE_REPO: harmonyone/harmony
        run: |
          set -euo pipefail

          TAG_MESSAGE="$(
            git for-each-ref "refs/tags/${RELEASE_TAG}" \
              --format='%(contents:subject)%0a%0a%(contents:body)'
          )"

          if [[ -z "${TAG_MESSAGE}" ]]; then
            echo "::error::could not read annotated tag message for ${RELEASE_TAG}"
            exit 1
          fi

          {
            echo "${TAG_MESSAGE}"
            echo
            echo "The released version: ${build_version_long}"
            echo
            echo "## Docker image"
            echo
            echo '```bash'
            echo "docker pull ${DOCKER_IMAGE_REPO}:${RELEASE_TAG}"
            echo '```'
            echo
            echo "Docker Hub:"
            echo "https://hub.docker.com/r/${DOCKER_IMAGE_REPO}/tags?name=${RELEASE_TAG}"
            echo
            echo "## Verify release binaries"
            echo
            echo "GPG signing key fingerprint:"
            echo
            echo '```text'
            echo "${GPG_KEY_FINGERPRINT}"
            echo '```'
            echo
            echo '```bash'
            echo "gpg --import RELEASE_SIGNING_KEY.asc"
            echo
            echo "gpg --verify harmony-amd64.sig harmony-amd64"
            echo "gpg --verify harmony-arm64.sig harmony-arm64"
            echo
            echo "sha256sum -c harmony-amd64.sha256"
            echo "sha256sum -c harmony-arm64.sha256"
            echo '```'
          } > tag_message.md
        working-directory: harmony
      - name: Recreate draft release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.check.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "[INFO] Release ${RELEASE_TAG} already exists, deleting it"

            gh release delete "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --yes
          fi

          gh release create "${RELEASE_TAG}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --draft \
            --verify-tag \
            --title "Mainnet Release ${build_version}" \
            --notes-file ./harmony/tag_message.md

      - name: Cleanup GPG key
        if: always()
        run: |
          set -euo pipefail

          gpgconf --kill all || true
          rm -rf ~/.gnupg
